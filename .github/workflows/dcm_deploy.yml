name: DCM Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT
      SNOWFLAKE_ACCOUNT: ${{ secrets.SF_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SF_USER }}
      SNOWFLAKE_PRIVATE_KEY_RAW: ${{ secrets.SF_PRIVATE_KEY }}
      SNOWFLAKE_ROLE: ECOM_DCM_ADMIN
      SNOWFLAKE_WAREHOUSE: COMPUTE_WH

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v1

      - name: Fetch Git Repo
        run: |
          snow sql -q "ALTER GIT REPOSITORY ECOM_DCM_REPO FETCH;" -x

      - name: Deploy DCM Project
        run: |
          snow sql -q "
          EXECUTE DCM PROJECT DEV_SF_DB.PUBLIC.ECOMMERCE_DCM_DEV
          DEPLOY AS 'ci cd deployment'
          USING CONFIGURATION dev
          FROM @ECOM_DCM_REPO/branches/main/;
          " -x
